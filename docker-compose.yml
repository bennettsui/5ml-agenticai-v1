version: "3.9"
services:
  app:
    image: 773182953886.dkr.ecr.ap-southeast-1.amazonaws.com/5ml-agenticai-v1:latest
    build: .
    container_name: 5ml-agenticai-app
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: 5ml-agenticai-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: local-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 5ml_agenticai_dev
    ports:
      - "5432:5432"
    volumes:
      - local_pgdata:/var/lib/postgresql/data

volumes:
  local_pgdata:
  caddy_data:
  caddy_config:
