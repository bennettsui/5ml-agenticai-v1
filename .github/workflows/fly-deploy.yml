name: Fly Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy app to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-group
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (with retry)
        run: |
          for i in 1 2 3; do
            echo "Deployment attempt $i..."
            if flyctl deploy --remote-only --strategy rolling --wait-timeout=10m; then
              echo "Deployment successful!"
              exit 0
            fi

            EXIT_CODE=$?
            echo "Attempt $i failed (exit $EXIT_CODE)"

            if [ $i -lt 3 ]; then
              WAIT=$((45 * i))
              echo "Waiting ${WAIT}s before retry..."
              sleep $WAIT
            fi
          done

          echo "::error::All 3 deployment attempts failed"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
