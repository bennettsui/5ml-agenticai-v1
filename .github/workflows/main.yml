name: EC2 Deploy

on:
  workflow_dispatch:        # 手動觸發
  push:
    branches:
      - master              # 或者改你用做 deploy 個 branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ap-southeast-1
      ECR_REPOSITORY: 5ml-agenticai-v1
      ECR_REGISTRY: 773182953886.dkr.ecr.ap-southeast-1.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_FILE,AWS_REGION,ECR_REGISTRY
          command_timeout: 90m
          script: |
            # 確保 repo 存在
            if [ ! -d "5ml-agenticai-v1" ]; then
              git clone https://github.com/bennettsui/5ml-agenticai-v1.git
            fi

            cd 5ml-agenticai-v1
            git pull origin master

            if [ -z "$ENV_FILE" ]; then
              echo "ENV_FILE secret is empty; aborting deploy."
              exit 1
            fi

            printf '%s' "$ENV_FILE" > .env
            sed -i 's/\r$//' .env
            sed -i 's/^export[[:space:]]\+//' .env

            invalid_lines=$(awk 'NF && $0 !~ /^#/ && $0 !~ /^[A-Za-z_][A-Za-z0-9_]*=/ {print NR}' .env)
            if [ -n "$invalid_lines" ]; then
              echo "Invalid .env lines (must be KEY=VALUE or comments): $invalid_lines"
              exit 1
            fi

            if ! command -v aws >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y awscli
            fi

            if ! command -v python3 >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y python3
            fi

            # Resolve DATABASE_URL from AWS Secrets Manager at deploy time
            DB_SECRET_ID=$(awk -F= '/^DB_SECRET_ID=/{sub(/^DB_SECRET_ID=/, ""); print; exit}' .env)
            if [ -z "$DB_SECRET_ID" ]; then
              echo "DB_SECRET_ID is missing in ENV_FILE/.env; aborting deploy."
              exit 1
            fi

            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --region "$AWS_REGION" \
              --secret-id "$DB_SECRET_ID" \
              --query SecretString \
              --output text)
            if [ -z "$SECRET_JSON" ] || [ "$SECRET_JSON" = "None" ]; then
              echo "Failed to load secret value for DB_SECRET_ID=$DB_SECRET_ID"
              exit 1
            fi

            DATABASE_URL=$(SECRET_JSON="$SECRET_JSON" python3 -c "import json, os, urllib.parse, sys; s = json.loads(os.environ['SECRET_JSON']); username = urllib.parse.quote(str(s.get('username', '')), safe=''); password = urllib.parse.quote(str(s.get('password', '')), safe=''); host = s.get('host', ''); port = str(s.get('port', 5432)); dbname = s.get('dbname') or 'postgres'; (username and password and host) or sys.exit('Secret is missing username/password/host'); print(f'postgresql://{username}:{password}@{host}:{port}/{dbname}?sslmode=require')")

            sed -i '/^DATABASE_URL=/d' .env
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL" >> .env

            chmod 600 .env

            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker pull "$ECR_REGISTRY/5ml-agenticai-v1:latest"
            docker compose up -d --no-build app
