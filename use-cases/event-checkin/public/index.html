<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RD Symposium — Check-in</title>
  <link rel="stylesheet" href="/event-checkin/static/css/style.css" />
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────────────────── -->
<header class="page-header">
  <div class="header-brand">
    <h1>🎟️ RD Symposium</h1>
    <span class="header-subtitle">Guest Check-in</span>
  </div>
  <nav>
    <a href="/event-checkin/admin">Admin</a>
    <a href="/">← Home</a>
  </nav>
  <span class="conn-status">
    <span class="conn-dot" id="connDot"></span>
    <span id="connLabel">Connecting…</span>
  </span>
</header>

<!-- ─── Main ─────────────────────────────────────────────────────────────── -->
<main class="container">

  <!-- Search bar + autocomplete -->
  <div class="search-wrap" style="margin-bottom:24px;">
    <input
      type="search"
      id="searchInput"
      class="search-input"
      placeholder="Search by name, organization, color…"
      autocomplete="off"
      aria-label="Search participants"
    />
    <div id="autocomplete" class="autocomplete hidden" role="listbox"></div>
  </div>

  <!-- Results list -->
  <div id="resultsList"></div>

  <!-- Initial hint -->
  <div id="hint" style="text-align:center;color:var(--text-muted);padding:40px 0;">
    Start typing to search participants…
  </div>

</main>

<!-- ─── Add Participant Modal ─────────────────────────────────────────────── -->
<div id="addModal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add New Participant</span>
      <button class="modal-close" id="addModalClose" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="addForm" autocomplete="off">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
          <div>
            <label for="af-color">Color <span style="color:red">*</span></label>
            <select id="af-color" name="color" required>
              <option value="">— select —</option>
              <option value="Red">Red</option>
              <option value="Purple">Purple</option>
              <option value="Blue">Blue</option>
              <option value="Green">Green</option>
            </select>
          </div>
          <div>
            <label for="af-title">Title</label>
            <input type="text" id="af-title" name="title" placeholder="Dr, Mr, Ms…" />
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
          <div>
            <label for="af-first">First Name</label>
            <input type="text" id="af-first" name="first_name" />
          </div>
          <div>
            <label for="af-last">Last Name</label>
            <input type="text" id="af-last" name="last_name" />
          </div>
        </div>
        <div style="margin-bottom:12px;">
          <label for="af-full">Full Name <span style="color:red">*</span></label>
          <input type="text" id="af-full" name="full_name" required placeholder="e.g. Terry LAI" />
        </div>
        <div style="margin-bottom:12px;">
          <label for="af-org">Organization</label>
          <input type="text" id="af-org" name="organization" />
        </div>
        <div>
          <label for="af-remarks">Remarks</label>
          <textarea id="af-remarks" name="remarks" rows="2"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="addModalCancel">Cancel</button>
      <button class="btn btn-primary" id="addModalSubmit">Add Participant</button>
    </div>
  </div>
</div>

<!-- ─── Toast container ───────────────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── Scripts ───────────────────────────────────────────────────────────── -->
<script>
  // Make the API base path available to checkin.js
  window.API_BASE = '/api/event-checkin';
</script>
<script src="/event-checkin/static/js/checkin.js"></script>
</body>
</html>
