<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RD Symposium — Live Status</title>
  <link rel="stylesheet" href="/event-checkin/static/css/style.css" />
  <style>
    /* ─── Client dashboard layout ──────────────────────────────── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .stat-hero {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 6px;
    }
    .stat-hero .big-num {
      font-size: 56px; font-weight: 800; line-height: 1;
      color: var(--color-green);
    }
    .stat-hero .big-denom {
      font-size: 22px; color: var(--text-muted); font-weight: 500;
    }
    .stat-hero .stat-label {
      font-size: 13px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .06em; margin-top: 6px;
    }
    .stat-hero .pct-badge {
      margin-top: 10px; padding: 4px 14px;
      background: rgba(34,197,94,.15); color: #86efac;
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 999px; font-size: 15px; font-weight: 700;
    }

    /* Color group cards */
    .groups-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
    }
    .group-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .group-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .group-name {
      font-size: 14px; font-weight: 700;
    }
    .group-count {
      font-size: 13px; color: var(--text-muted);
    }
    .progress-track {
      height: 8px; border-radius: 4px;
      background: rgba(255,255,255,0.06);
      overflow: hidden; margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; border-radius: 4px;
      transition: width .6s ease;
    }
    .fill-Red    { background: var(--color-red); }
    .fill-Purple { background: var(--color-purple); }
    .fill-Blue   { background: var(--color-blue); }
    .fill-Green  { background: var(--color-green); }
    .group-footer {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text-muted);
    }
    .group-pct { font-weight: 700; }

    /* Bottom two-col section */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .section-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .section-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }

    /* Recent activity feed */
    .activity-list {
      list-style: none; max-height: 340px; overflow-y: auto;
    }
    .activity-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      font-size: 13px; animation: slideIn .25s ease;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 48px; }
    .activity-name { flex: 1; font-weight: 600; }
    .activity-org  { font-size: 11px; color: var(--text-muted); }

    /* AI Chatbot */
    .chat-messages {
      padding: 14px 18px;
      max-height: 240px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .chat-msg {
      font-size: 13px; line-height: 1.55;
      padding: 10px 13px; border-radius: var(--radius-sm);
      max-width: 90%;
    }
    .chat-msg.user {
      background: rgba(59,130,246,.15); color: #93c5fd;
      align-self: flex-end;
    }
    .chat-msg.bot {
      background: rgba(255,255,255,0.05); color: var(--text);
      align-self: flex-start;
    }
    .chat-msg.thinking {
      color: var(--text-muted); font-style: italic;
      background: none; padding: 4px 0;
    }
    .chat-input-row {
      display: flex; gap: 8px;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
    }
    .chat-input-row input {
      flex: 1; font-size: 13px;
    }

    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .groups-grid    { grid-template-columns: 1fr 1fr; }
      .bottom-grid    { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────────────────── -->
<header class="page-header">
  <div class="header-brand">
    <h1>🎟️ RD Symposium</h1>
    <span class="header-subtitle">Live Status</span>
  </div>
  <nav>
    <a href="/event-checkin">Reception</a>
    <a href="/event-checkin/admin">Admin</a>
  </nav>
  <span class="conn-status">
    <span class="conn-dot" id="connDot"></span>
    <span id="connLabel">Connecting…</span>
  </span>
</header>

<div class="container-wide">

  <!-- ─── Stats row ──────────────────────────────────────────────────── -->
  <div class="dashboard-grid" style="margin-top:20px;">

    <!-- Overall hero stat -->
    <div class="stat-hero">
      <div>
        <span class="big-num" id="heroChecked">—</span>
        <span class="big-denom"> / <span id="heroTotal">—</span></span>
      </div>
      <div class="stat-label">Guests Checked-in</div>
      <div class="pct-badge" id="heroPct">—%</div>
      <div id="lastRefresh" style="font-size:11px;color:var(--text-muted);margin-top:10px;">Refreshing…</div>
    </div>

    <!-- Color group breakdown -->
    <div class="groups-grid" id="groupsGrid">
      <!-- Rendered by client.js -->
      <div class="group-card"><div style="color:var(--text-muted);font-size:13px;">Loading…</div></div>
      <div class="group-card"></div>
      <div class="group-card"></div>
      <div class="group-card"></div>
    </div>

  </div>

  <!-- ─── Bottom row: activity feed + AI chatbot ───────────────────── -->
  <div class="bottom-grid">

    <!-- Recent check-ins -->
    <div class="section-card">
      <div class="section-header">
        <span class="conn-dot connected pulse" style="width:7px;height:7px;box-shadow:none;flex-shrink:0;"></span>
        Recent Check-ins
      </div>
      <ul class="activity-list" id="activityList">
        <li style="padding:20px 18px;color:var(--text-muted);font-size:13px;">Waiting for check-in events…</li>
      </ul>
    </div>

    <!-- AI Chatbot -->
    <div class="section-card" style="display:flex;flex-direction:column;">
      <div class="section-header">✨ AI Assistant</div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg bot">
          Hi! I can answer questions about today's guest list — who's checked in, group breakdowns, missing guests, and more.
        </div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput"
          placeholder="e.g. Who from Red hasn't arrived yet?"
          autocomplete="off" />
        <button class="btn btn-primary btn-sm" id="chatSend">Ask</button>
      </div>
    </div>

  </div>

</div>

<!-- ─── Toast container ───────────────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ─── Scripts ───────────────────────────────────────────────────────────── -->
<script>
  window.API_BASE = '/api/event-checkin';
</script>
<script src="/event-checkin/static/js/client.js"></script>
</body>
</html>
